<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>EV MAXIMIZER - Elite GTO System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --bg: #000; --panel: #0a0a0a; --accent: #00ff87; --text: #e0e0e0; --border: #1a1a1a; --blue: #00d4ff; --nash: #ff4444; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }
        
        /* --- STILI DASHBOARD (Mantenuti come originali) --- */
        .glass-card { background: rgba(23, 32, 51, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        .sidebar { width: 280px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px 20px; z-index: 50; }
        .nav-item { padding: 12px 16px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; color: #888; }
        .nav-item.active { background: rgba(0, 255, 135, 0.1); color: var(--accent); }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; position: relative; }
        .stat-card { background: var(--panel); border: 1px solid var(--border); padding: 24px; border-radius: 20px; }
        .profit-pill { padding: 4px 12px; border-radius: 20px; font-weight: 800; font-size: 0.85rem; }
        .pos { background: rgba(0, 255, 135, 0.1); color: #00ff87; }
        .neg { background: rgba(255, 68, 68, 0.1); color: #ff4444; }
    </style>
</head>
<body>

    <div id="authBox" class="fixed inset-0 z-[100] flex items-center justify-center bg-black hidden">
        <div class="glass-card p-10 w-full max-w-md text-center border border-white/10">
            <h2 class="text-3xl font-black mb-2 tracking-tighter">EV <span class="text-[#00ff87]">MAXIMIZER</span></h2>
            <p class="text-slate-400 mb-8 text-sm">Elite GTO Grinder System</p>
            <input type="text" id="user" placeholder="Username" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4 outline-none focus:border-[#00ff87] transition-all">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-6 outline-none focus:border-[#00ff87] transition-all">
            <button onclick="handleLogin()" class="w-full bg-[#00ff87] text-black font-black p-4 rounded-xl hover:scale-[1.02] active:scale-[0.98] transition-all">ACCEDI AL SISTEMA</button>
        </div>
    </div>

    <div id="dashboard" class="flex w-full hidden">
        <aside class="sidebar">
            <div class="text-2xl font-black mb-10 tracking-tighter px-4">EV <span class="text-[#00ff87]">MAX</span></div>
            <nav class="flex-1">
                <div class="nav-item active"><i class="fas fa-chart-line"></i> Dashboard</div>
                <div class="nav-item"><i class="fas fa-history"></i> Sessioni</div>
                <div class="nav-item"><i class="fas fa-brain"></i> GTO Trainer</div>
            </nav>
            <div class="glass-card p-4 mt-auto">
                <div class="text-[10px] text-slate-500 uppercase font-bold mb-1">Status Sistema</div>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-[#00ff87] rounded-full animate-pulse"></div>
                    <span class="text-xs font-bold text-slate-300">CLOUD SYNC ACTIVE</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="flex justify-between items-center mb-12">
                <div>
                    <h1 class="text-4xl font-black tracking-tight" id="welcome-msg">Bentornato, OPERATOR</h1>
                    <p class="text-slate-500 font-medium">Analisi in tempo reale del tuo grinding</p>
                </div>
                <div class="text-right">
                    <div class="text-[10px] text-slate-500 font-black uppercase tracking-widest">Bankroll Attuale</div>
                    <div id="live-balance" class="text-3xl font-black text-[#00ff87]">€ 0.00</div>
                </div>
            </header>

            <div class="grid grid-cols-3 gap-6 mb-10">
                <div class="stat-card">
                    <div class="text-slate-500 text-xs font-bold uppercase mb-2">Profitto Mensile</div>
                    <div id="monthly-profit" class="text-2xl font-black">€ 0.00</div>
                </div>
                <div class="stat-card border-l-4 border-l-[#00ff87]">
                    <div class="text-slate-500 text-xs font-bold uppercase mb-2">Mani Totali</div>
                    <div id="total-hands" class="text-2xl font-black">0</div>
                </div>
                <div class="stat-card">
                    <div class="text-slate-500 text-xs font-bold uppercase mb-2">EV Atteso</div>
                    <div id="ev-stat" class="text-2xl font-black text-cyan-400">0.00 bb/100</div>
                </div>
            </div>

            <div class="glass-card p-8">
                <h3 class="text-xl font-black mb-6 flex items-center gap-3">
                    <i class="fas fa-list-ul text-[#00ff87]"></i> Ultime Sessioni
                </h3>
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-500 text-[10px] font-black uppercase tracking-widest border-b border-white/5">
                            <th class="pb-4">Orario</th>
                            <th class="pb-4">Profitto</th>
                            <th class="pb-4">Buy-in</th>
                        </tr>
                    </thead>
                    <tbody id="session-table">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx4XJHjnP22eyaBmSzzxD_3i51YK-LXLEtO65FSpGHiGGGXz2Gw-BZG23u4NnnKniNj/exec"; // Assicurati di mettere l'URL del nuovo deployment
        let startingBankroll = 5000; 

        // --- LOGICA DI ACCESSO DIRETTO (SENIOR BYPASS) ---
        window.onload = function() {
            // Iniettiamo forzatamente lo stato loggato
            localStorage.setItem('ev_logged', 'true');
            localStorage.setItem('ev_user', 'OPERATOR');
            
            // Portiamo l'utente direttamente alla dashboard
            showDash();
            
            // Avviamo il recupero dei dati
            refreshStats();
            // Loop di aggiornamento ogni 30 secondi
            setInterval(refreshStats, 30000);
        };

        function showDash() {
            document.getElementById('authBox').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.body.className = "bg-black text-white";
        }

        async function refreshStats() {
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getSessions&username=OPERATOR`);
                const sessions = await response.json();
                
                let monthlyProfit = 0;
                let totalHands = 0;
                const tbody = document.getElementById('session-table');
                tbody.innerHTML = "";

                sessions.forEach(s => {
                    monthlyProfit += parseFloat(s.profit || 0);
                    totalHands += parseInt(s.hands || 0);
                });

                document.getElementById('monthly-profit').innerText = `€ ${monthlyProfit.toFixed(2)}`;
                document.getElementById('total-hands').innerText = totalHands.toLocaleString();
                
                // Popolamento Tabella
                sessions.slice().reverse().slice(0, 10).forEach(s => {
                    const dateObj = new Date(s.timestamp || s.data);
                    const timeStr = isNaN(dateObj) ? "--:--" : dateObj.getHours() + ":" + String(dateObj.getMinutes()).padStart(2, '0');
                    const colorClass = parseFloat(s.profit) < 0 ? "neg" : "pos";
                    
                    tbody.innerHTML += `
                        <tr class="border-b border-white/5">
                            <td class="py-3 text-slate-500 font-mono text-sm">${timeStr}</td>
                            <td class="py-3"><span class="profit-pill ${colorClass}">${parseFloat(s.profit) >= 0 ? '+' : ''}${s.profit}€</span></td>
                            <td class="py-3 text-slate-300 font-mono text-sm">${s.buyin}€</td>
                        </tr>`;
                });

                updateLiveBalance(monthlyProfit);
            } catch (e) { 
                console.log("Sync Error:", e);
            }
        }

        function updateLiveBalance(profit) {
            const current = startingBankroll + profit;
            const el = document.getElementById('live-balance');
            if(el) {
                el.innerText = "€ " + current.toFixed(2);
                el.style.color = current >= startingBankroll ? "#00ff87" : "#ff4444";
            }
        }

        // Manteniamo handleLogin solo come fallback di emergenza
        async function handleLogin() {
            localStorage.setItem('ev_logged', 'true');
            showDash();
            refreshStats();
        }
    </script>
</body>
</html>
